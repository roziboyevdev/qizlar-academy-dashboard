<svg xmlns="http://www.w3.org/2000/svg" width="220" height="64" viewBox="0 0 220 64" role="img" aria-label="Get it on Google Play">
  <defs>
    <linearGradient id="gp-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00DDFF"/>
      <stop offset="100%" stop-color="#0078FF"/>
    </linearGradient>
    <linearGradient id="gp-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F076"/>
      <stop offset="100%" stop-color="#00C853"/>
    </linearGradient>
    <linearGradient id="gp-yellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFE000"/>
      <stop offset="100%" stop-color="#FFBD00"/>
    </linearGradient>
    <linearGradient id="gp-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3A44"/>
      <stop offset="100%" stop-color="#C31162"/>
    </linearGradient>
    <filter id="gp-shadow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect x="2" y="2" width="216" height="60" rx="11" fill="#000000" stroke="#A6A6A6" stroke-width="1" filter="url(#gp-shadow)"/>

  <!-- Authentic Google Play 4-color triangle -->
  <g transform="translate(18, 16)">
    <path d="M0 1.5 L0 30.5 L15.5 16 Z" fill="url(#gp-blue)"/>
    <path d="M0 1.5 L21 13.5 L15.5 16 Z" fill="url(#gp-green)"/>
    <path d="M0 30.5 L21 18.5 L15.5 16 Z" fill="url(#gp-red)"/>
    <path d="M21 13.5 L29 16 L21 18.5 L15.5 16 Z" fill="url(#gp-yellow)"/>
  </g>

  <g font-family="Roboto, 'Helvetica Neue', Helvetica, Arial, sans-serif" fill="#FFFFFF">
    <text x="58" y="25" font-size="10" font-weight="400" letter-spacing="1.3">GET IT ON</text>
    <text x="58" y="48" font-size="20" font-weight="500" letter-spacing="-0.2">Google Play</text>
  </g>
</svg>
