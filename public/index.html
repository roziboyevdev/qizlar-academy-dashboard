<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/logo_only.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#faf7f9" />
  <meta name="color-scheme" content="light dark" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <title>Qizlar Akademiyasi — qizlar uchun onlayn ta'lim va kurslar</title>
  <meta name="description"
    content="O'zbekistondagi yirik qizlar onlayn ta'lim platformasi: sifatli kurslar, professional mentorlar, hamjamiyat va rasmiy sertifikatlar. IT, dizayn, biznes va boshqa yo'nalishlar." />
  <meta name="keywords"
    content="Qizlar Akademiyasi, qizlar uchun kurslar, onlayn ta'lim O'zbekiston, ayollar IT kursi, onlayn platforma, ta'lim sertifikati" />
  <meta name="author" content="Qizlar Akademiyasi" />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <meta name="googlebot" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo_only.svg" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
  <script>
    (function () {
      try {
        var k = 'ui-theme';
        var t = localStorage.getItem(k);
        var resolved = 'light';
        if (t === 'dark') resolved = 'dark';
        else if (t === 'light') resolved = 'light';
        else if (t === 'system')
          resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.classList.remove('light', 'dark');
        document.documentElement.classList.add(resolved);
      } catch (e) {
        document.documentElement.classList.add('light');
      }
    })();
  </script>
</head>

<body>
  <noscript>
    <h1>Qizlar Akademiyasi</h1>
    <p>
      O'zbekistondagi yirik qizlar onlayn ta'lim platformasi: sifatli kurslar, professional mentorlar va hamjamiyat.
      To'liq tajriba uchun JavaScript yoqilgan brauzerdan foydalaning.
    </p>
  </noscript>
  <div id="root"></div>
</body>

</html>
